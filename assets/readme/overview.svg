<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skills Codex overview</title>
  <desc id="desc">Codex-first skill workflow showing task intake, skill routing, implementation, browser proof, layout QA, backend review, and evidence-based completion.</desc>
  <rect width="1200" height="630" rx="28" fill="#F7F9FC"/>
  <rect x="34" y="34" width="1132" height="562" rx="24" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2"/>

  <text x="72" y="92" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="760">Agent Skills Codex</text>
  <text x="72" y="126" fill="#526173" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">Codex-first engineering skills with browser proof, visual QA, backend reliability,</text>
  <text x="72" y="154" fill="#526173" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">and evidence-based completion gates.</text>

  <rect x="72" y="186" width="170" height="78" rx="16" fill="#EEF6FF" stroke="#9CCBFF"/>
  <text x="157" y="218" text-anchor="middle" fill="#0F4C81" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="720">Task</text>
  <text x="157" y="244" text-anchor="middle" fill="#476173" font-family="Inter, ui-sans-serif, system-ui" font-size="14">request + repo</text>

  <path d="M260 225H316" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round"/>
  <path d="M307 214L319 225L307 236" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="338" y="186" width="190" height="78" rx="16" fill="#F0FDF4" stroke="#86D39B"/>
  <text x="433" y="218" text-anchor="middle" fill="#166534" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="720">Skill Routing</text>
  <text x="433" y="244" text-anchor="middle" fill="#486657" font-family="Inter, ui-sans-serif, system-ui" font-size="14">choose the right gate</text>

  <path d="M546 225H602" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round"/>
  <path d="M593 214L605 225L593 236" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="624" y="186" width="170" height="78" rx="16" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="709" y="218" text-anchor="middle" fill="#9A3412" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="720">Build</text>
  <text x="709" y="244" text-anchor="middle" fill="#71513A" font-family="Inter, ui-sans-serif, system-ui" font-size="14">small tested changes</text>

  <path d="M812 225H868" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round"/>
  <path d="M859 214L871 225L859 236" stroke="#8EA3B7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="890" y="186" width="210" height="78" rx="16" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="995" y="218" text-anchor="middle" fill="#5B21B6" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="720">Evidence Gate</text>
  <text x="995" y="244" text-anchor="middle" fill="#5D5676" font-family="Inter, ui-sans-serif, system-ui" font-size="14">no proof, no completion</text>

  <rect x="82" y="322" width="308" height="146" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="116" cy="358" r="13" fill="#2563EB"/>
  <text x="144" y="365" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="19" font-weight="720">Browser UI verification</text>
  <text x="116" y="401" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Open the app, operate the journey,</text>
  <text x="116" y="427" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">capture screenshots, console logs,</text>
  <text x="116" y="453" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">and network summaries.</text>

  <rect x="446" y="322" width="308" height="146" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="480" cy="358" r="13" fill="#16A34A"/>
  <text x="508" y="365" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="19" font-weight="720">Visual layout QA</text>
  <text x="480" y="401" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Catch overlap, overflow, clipping,</text>
  <text x="480" y="427" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">small touch targets, and responsive</text>
  <text x="480" y="453" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">breakage before claiming done.</text>

  <rect x="810" y="322" width="308" height="146" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="844" cy="358" r="13" fill="#EA580C"/>
  <text x="872" y="365" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="19" font-weight="720">Backend reliability</text>
  <text x="844" y="401" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Review validation, auth, idempotency,</text>
  <text x="844" y="427" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">consistency, concurrency, retries,</text>
  <text x="844" y="453" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="15">and failure behavior.</text>

  <rect x="212" y="510" width="776" height="50" rx="25" fill="#111827"/>
  <text x="600" y="542" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="720">Final answer: changed files + verification + evidence + risks + not verified</text>
</svg>
