name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reject .DS_Store
        run: test -z "$(find . -name .DS_Store -print)"

      - name: Validate skills
        run: node scripts/validate-skills.mjs

      - name: Check Node scripts
        run: |
          node --check scripts/validate-skills.mjs
          node --check scripts/sync-repo-skills.mjs
          node --check scripts/generate-evidence-report.mjs
          node --check scripts/assert-evidence-complete.mjs
          node --check skills/visual-regression-and-layout-qa/scripts/playwright-layout-audit.mjs

      - name: Smoke test evidence checker
        run: |
          mkdir -p /tmp/evidence
          touch /tmp/evidence/after-home-desktop.png
          touch /tmp/evidence/after-home-mobile.png
          touch /tmp/evidence/console-log.txt
          touch /tmp/evidence/network-summary.md
          touch /tmp/evidence/layout-audit.json
          printf '# Completion Report\n\n## Not Verified\n- None\n' > /tmp/evidence/completion-report.md
          node scripts/assert-evidence-complete.mjs --task frontend --evidence /tmp/evidence

      - name: Check plugin manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('.codex-plugin/plugin.json', 'utf8'))"
